<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — Trace</title>
    
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <link rel="stylesheet" href="output.css">
    <link rel="icon" href="assests/2.svg">

    <!-- Marquee animation for promo bar -->
    <style>
        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
        }
    </style>
</head>
<body class="bg-base-200 scroll-smooth overflow-x-hidden scrollbar-none flex flex-col min-h-screen">
    
    <!-- Store-specific navigation -->
    <store-nav></store-nav>

    <!-- Main Content Area -->
    <main class="flex-1 px-6 md:px-10 lg:px-16 py-12 md:py-24">
        <!-- Breadcrumb -->
        <div class="mb-8">
            <a href="store.html" class="text-sm font-semibold text-base-content/80 hover:text-base-content transition-colors">← Back to Store</a>
        </div>

        <div class="max-w-7xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-black uppercase mb-4" id="product-title">Loading...</h1>
            <p class="text-lg text-base-content/60" id="product-price"></p>
            
            <div class="mt-12 p-12 border-2 border-dashed border-base-300 rounded-3xl flex items-center justify-center min-h-[40vh]">
                <p class="text-xl font-medium text-base-content/40">Product details template — design goes here.</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <site-footer></site-footer>

    <!-- Scripts -->
    <script src="products.js"></script>
    <script src="components/store-nav.js"></script>
    <script src="components/footer.js" defer></script>
    
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const product = PRODUCTS.find(p => p.id === id);
            
            if (product) {
                document.title = product.name + " — Trace";
                document.getElementById('product-title').textContent = product.name;
                document.getElementById('product-price').textContent = "€" + product.price + ",90";
            } else {
                document.getElementById('product-title').textContent = "Product Not Found";
                document.getElementById('product-price').textContent = "";
            }
        });
    </script>
</body>
</html>
