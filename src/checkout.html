<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Trace</title>

    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <link rel="stylesheet" href="output.css">
    <link rel="icon" href="assests/2.svg">

   
    <style>
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            animation: marquee 30s linear infinite;
        }
    </style>
</head>

<body class="bg-base-200 scroll-smooth overflow-x-hidden scrollbar-none flex flex-col min-h-screen">

   
    <store-nav></store-nav>

  
    <main class="flex-1 max-w-[1400px] w-full mb-32 mx-auto px-4 md:px-8 py-8 md:py-12 relative">
        <h1 class="text-3xl md:text-4xl font-bold mb-8 text-black">Your Cart</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 relative" id="cart-content-wrapper">
           
            <div class="lg:col-span-2 flex flex-col gap-8">
                <div id="cart-items-container" class="flex flex-col gap-6">
                    
                    <p class="text-base-content/60" id="empty-cart-message">Your cart is currently empty.</p>
                </div>

                
                <div class="bg-white p-6 md:p-8 rounded-2xl border border-base-300">
                    <h2 class="text-2xl font-bold mb-6 text-black">Payment Method</h2>
                    
                    <div class="flex flex-col gap-4 mb-6">
                        <!-- Credit Card Option -->
                        <label class="flex items-center justify-between p-4 border border-black rounded-xl cursor-pointer bg-base-100 transition-all payment-option" id="label-cc">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="payment_method" value="credit_card" class="radio radio-sm" checked>
                                <span class="font-medium text-black">Credit Card</span>
                            </div>
                            <div class="flex gap-2">
                                <svg class="w-8 h-6 text-black" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4C2.89 4 2.01 4.89 2.01 6L2 18C2 19.11 2.89 20 4 20H20C21.11 20 22 19.11 22 18V6C22 4.89 21.11 4 20 4ZM20 18H4V12H20V18ZM20 8H4V6H20V8Z"/></svg>
                            </div>
                        </label>
                        
                        <!-- PayPal Option -->
                        <label class="flex items-center justify-between p-4 border border-base-300 rounded-xl cursor-pointer hover:border-black transition-all payment-option" id="label-paypal">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="payment_method" value="paypal" class="radio radio-sm">
                                <span class="font-medium text-black">PayPal</span>
                            </div>
                            <div class="flex gap-2">
                                <img src="assests/paypal.png" alt="PayPal" class="h-6">
                            </div>
                        </label>
                    </div>

                    <form class="space-y-4" id="form-cc">
                       
                        <div>
                            <label class="block text-sm font-medium text-black mb-1">Name on card</label>
                            <input type="text" placeholder="John Doe" class="w-full h-12 px-4 rounded-xl border border-base-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all bg-base-100 text-black">
                        </div>
                        
                        
                        <div>
                            <label class="block text-sm font-medium text-black mb-1">Card number</label>
                            <div class="relative">
                                <input type="text" placeholder="0000 0000 0000 0000" class="w-full h-12 pl-4 pr-10 rounded-xl border border-base-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all bg-base-100 text-black">
                                <div class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/40">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                       
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-black mb-1">Expiration date (MM/YY)</label>
                                <input type="text" placeholder="MM/YY" class="w-full h-12 px-4 rounded-xl border border-base-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all bg-base-100 text-black">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-black mb-1">CVC</label>
                                <input type="text" placeholder="123" class="w-full h-12 px-4 rounded-xl border border-base-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all bg-base-100 text-black">
                            </div>
                        </div>
                    </form>

                    <div id="form-paypal" class="hidden text-center py-8 bg-base-100 rounded-xl border border-base-300">
                        <img src="assests/paypal.png" alt="PayPal" class="h-12 mx-auto mb-4">
                        <p class="text-black font-medium mb-2">You will be redirected to PayPal to complete your purchase securely.</p>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl sticky top-24 shadow-sm border border-base-300">
                    <h2 class="text-2xl font-bold mb-6 text-black">Order Summary</h2>
                    
                    <div class="flex justify-between items-center mb-4 text-black">
                        <span class="text-base-content/70">Subtotal</span>
                        <span class="font-medium" id="summary-subtotal">0 ฿</span>
                    </div>
                    
                    <div class="flex justify-between items-center mb-6 text-black">
                        <span class="text-base-content/70">Shipping</span>
                        <span class="font-medium" id="summary-shipping">Free</span>
                    </div>
                    
                    <div class="divider"></div>
                    
                    <div class="flex justify-between items-center mb-8 text-black text-lg">
                        <span class="font-bold">Total</span>
                        <span class="font-bold text-2xl" id="summary-total">0 ฿</span>
                    </div>
                    
                    <button id="checkout-btn" class="btn bg-black text-white hover:bg-black/85 w-full rounded-xl h-14 text-base font-bold transition-all" disabled>
                        Proceed to Payment
                    </button>
                    
                    <p class="text-xs text-base-content/50 text-center mt-4">
                        Secure encrypted checkout.
                    </p>
                </div>
            </div>
        </div>
    </main>

   
    <site-footer></site-footer>

   
    <script src="components/store-nav.js"></script>
    <script src="components/footer.js" defer></script>
    
    <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const cartItemsContainer = document.getElementById('cart-items-container');
            const emptyCartMessage = document.getElementById('empty-cart-message');
            const summarySubtotal = document.getElementById('summary-subtotal');
            const summaryShipping = document.getElementById('summary-shipping');
            const summaryTotal = document.getElementById('summary-total');
            const checkoutBtn = document.getElementById('checkout-btn');

           
            function renderCart() {
                let cart = [];
                try {
                    cart = JSON.parse(localStorage.getItem('cart') || '[]');
                } catch(e) {
                    console.error("Failed to parse cart", e);
                }

                cartItemsContainer.innerHTML = '';
                
                if (cart.length === 0) {
                    emptyCartMessage.style.display = 'block';
                    cartItemsContainer.appendChild(emptyCartMessage);
                    updateSummary(0);
                    return;
                }
                
                emptyCartMessage.style.display = 'none';
                let subtotal = 0;

                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    subtotal += itemTotal;

                    const itemEl = document.createElement('div');
                    itemEl.className = "flex gap-6 bg-white p-4 md:p-6 rounded-2xl border border-base-300 relative group";
                    
                    itemEl.innerHTML = `
                        <a href="product.html?id=${item.id}" class="w-24 md:w-32 shrink-0 bg-base-200 rounded-xl overflow-hidden aspect-[4/5] block">
                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover mix-blend-multiply">
                        </a>
                        <div class="flex-1 flex flex-col justify-between py-1">
                            <div>
                                <div class="flex justify-between items-start pr-8 md:pr-12">
                                    <a href="product.html?id=${item.id}" class="text-lg md:text-xl font-bold text-black ">${item.name}</a>
                                    <p class=" text-lg md:text-xl shrink-0 ml-4">${itemTotal} ฿</p>
                                </div>
                                <div class="text-sm text-base-content/60 mt-1 md:mt-2 space-y-1">
                                    <p>Color: <span class="font-medium text-black">${item.color}</span></p>
                                    <p>Size: <span class="font-medium text-black">${item.size}</span></p>
                                    <div class="flex items-center gap-4 mt-4">
                                        <div class="flex items-center bg-base-200 rounded-lg h-9 w-fit">
                                            <button class="px-3 hover:text-black transition-colors decrease-qty" data-index="${index}">-</button>
                                            <span class="font-medium text-black text-sm w-6 text-center">${item.quantity}</span>
                                            <button class="px-3 hover:text-black transition-colors increase-qty" data-index="${index}">+</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button class="absolute top-25 right-4 md:top-4 md:right-7 md:mt-2 cursor-pointer text-base-content/40 hover:bg-red-500 transition-colors p-2 rounded-full remove-item" data-index="${index}" aria-label="Remove item">
                            <svg class="w-5 h-5 hover:text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                            </svg>
                        </button>
                    `;
                    cartItemsContainer.appendChild(itemEl);
                });

                
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                        cart.splice(index, 1);
                        saveAndRender(cart);
                    });
                });

                document.querySelectorAll('.decrease-qty').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                        if (cart[index].quantity > 1) {
                            cart[index].quantity -= 1;
                            saveAndRender(cart);
                        }
                    });
                });

                document.querySelectorAll('.increase-qty').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                        cart[index].quantity += 1;
                        saveAndRender(cart);
                    });
                });

                updateSummary(subtotal);
            }

            function saveAndRender(cart) {
                localStorage.setItem('cart', JSON.stringify(cart));
                window.dispatchEvent(new Event('cart-updated')); // Notify store-nav
                renderCart();
            }

            function updateSummary(subtotal) {
                summarySubtotal.textContent = subtotal + " ฿";
                
                let shipping = 0;
                if (subtotal === 0) {
                    summaryShipping.textContent = "0 ฿";
                    checkoutBtn.disabled = true;
                } else if (subtotal >= 1000) {
                    summaryShipping.textContent = "Free";
                    checkoutBtn.disabled = false;
                } else {
                    shipping = 100;
                    summaryShipping.textContent = shipping + " ฿";
                    checkoutBtn.disabled = false;
                }
                
                const total = subtotal + shipping;
                summaryTotal.textContent = total + " ฿";
            }

            
            renderCart();

            window.addEventListener('storage', (e) => {
                if (e.key === 'cart') {
                    renderCart();
                }
            });

            // Payment method toggle logic
            const paymentRadios = document.querySelectorAll('input[name="payment_method"]');
            const formCc = document.getElementById('form-cc');
            const formPaypal = document.getElementById('form-paypal');
            const labelCc = document.getElementById('label-cc');
            const labelPaypal = document.getElementById('label-paypal');

            paymentRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'credit_card') {
                        formCc.classList.remove('hidden');
                        formPaypal.classList.add('hidden');
                        labelCc.classList.add('border-black');
                        labelCc.classList.remove('border-base-300');
                        labelPaypal.classList.remove('border-black');
                        labelPaypal.classList.add('border-base-300');
                    } else if (e.target.value === 'paypal') {
                        formCc.classList.add('hidden');
                        formPaypal.classList.remove('hidden');
                        labelPaypal.classList.add('border-black');
                        labelPaypal.classList.remove('border-base-300');
                        labelCc.classList.remove('border-black');
                        labelCc.classList.add('border-base-300');
                    }
                });
            });
        });
    </script>
</body>

</html>
